<div class="popup" id="edit-{{ project.id }}" data-popup>
    <form
        method="post"
        class="popup__content popup__content--edit"
        data-project-form
        role="dialog"
        aria-modal="true"
        aria-labelledby="project-edit-title-{{ project.id }}"
    >
        {% csrf_token %}
        <input type="hidden" name="project_id" value="{{ project.id }}" />
        <input type="hidden" name="form_action" value="edit_project" />
        <header>
            <h2 id="project-edit-title-{{ project.id }}">Aktion bearbeiten</h2>
            <button type="button" class="btn btn-link" data-popup-switch="details-{{ project.id }}">Zurück</button>
        </header>

        {% include "projects/_project_form_fields.html" with form=form %}

        <div class="popup__actions">
            <button type="submit" class="btn btn-primary">Fertig</button>
            <button type="button" class="btn btn-secondary" data-popup-close>Schließen</button>
        </div>
    </form>
</div>
